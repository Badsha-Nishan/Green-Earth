<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- FebIcon and Title -->
    <title>Green Earth</title>
    <link
      rel="shortcut icon"
      href="./assets/hero-leaf1.png"
      type="image/x-icon"
    />

    <!-- Tailwind and Daisy UI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- StyleSheet -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="bg-[#15803D]">
      <nav
        class="w-11/12 mx-auto flex justify-between text-white py-9 font-medium"
      >
        <div>
          <h3 class="text-2xl font-bold">Green Earth</h3>
        </div>
        <div class="">
          <a class="btn btn-outline" href="#">About</a>
          <a class="btn btn-outline" href="#">Gallery</a>
          <a class="btn btn-outline" href="#">Plant a Tree</a>
        </div>
        <div>
          <button class="btn btn-warning text-[#15803D]">Plant a Tree</button>
        </div>
      </nav>
    </header>
    <main>
      <section class="grid grid-cols-3 items-center bg-[#CFF0DC] gap-4">
        <div><img src="./assets/hero-leaf1.png" alt="" /></div>
        <div class="text-center space-y-4">
          <h2 class="text-4xl font-bold">Plant a Tree, Grow a Future</h2>
          <p class="mb-7">
            Join our mission to plant 1 million trees and make the Earth greener
            for             future generations.
          </p>
          <div>
            <button class="btn btn-warning bg-[#FACC15] text-[#15803D]">
              Get Involved
            </button>
          </div>
        </div>
        <div><img src="./assets/hero-leaf2.png" alt="" /></div>
      </section>
    </main>
  </body>
</html>
